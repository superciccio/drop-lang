name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          declare -a targets=(
            "darwin:arm64"
            "darwin:amd64"
            "linux:arm64"
            "linux:amd64"
            "windows:amd64"
          )

          mkdir -p dist

          for target in "${targets[@]}"; do
            os="${target%%:*}"
            arch="${target##*:}"
            bin="drop"
            archive="drop-${os}-${arch}.tar.gz"

            if [ "$os" = "windows" ]; then
              bin="drop.exe"
              archive="drop-${os}-${arch}.zip"
            fi

            echo "Building ${os}/${arch}..."
            GOOS="$os" GOARCH="$arch" go build -o "dist/${bin}" ./cmd/drop/

            cd dist
            if [ "$os" = "windows" ]; then
              zip "$archive" "$bin"
            else
              tar czf "$archive" "$bin"
            fi
            rm "$bin"
            cd ..
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
